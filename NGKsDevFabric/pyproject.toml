[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[project]
name = "ngksdevfabric"
description = "NGKs DevFabric build/ship/doctor orchestration CLI"
version = "0.1.15"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Proprietary" }
authors = [{ name = "NGKsSystems" }]
dependencies = [
	"ngksgraph==0.1.9",
	"ngksbuildcore==0.1.4",
	"ngksenvcapsule==0.1.2",
	"ngkslibrary==0.1.2",
]

[project.scripts]
ngksdevfabric = "ngksdevfabric.cli:main"

[project.optional-dependencies]
dev = [
	"pytest>=8",
]

[tool.hatch.build.targets.wheel]
packages = ["src/ngksdevfabric"]
