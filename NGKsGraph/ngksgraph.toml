name = "NGKsGraph"
out_dir = "build"
target_type = "exe"
cxx_std = 20
src_glob = ["examples/hello_msvc/src/**/*.cpp"]
include_dirs = []
defines = ["UNICODE", "_UNICODE"]
cflags = []
ldflags = []
libs = []
lib_dirs = []

[profiles.debug]
cflags = ["/Od", "/Zi"]
defines = ["DEBUG"]
ldflags = []

[profiles.release]
cflags = ["/O2"]
defines = ["NDEBUG"]
ldflags = []

[qt]
enabled = false
